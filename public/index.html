<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urenregistratie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="login-container" class="app-container glass" style="max-width: 400px; margin: auto; margin-top: 10vh;">
        <header>
            <h1>Login</h1>
            <p>Log in om door te gaan</p>
        </header>
        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mailadres</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Inloggen</button>
            </div>
            <p id="login-error" style="color: var(--danger-color); margin-top: 1rem; text-align: center; display: none;">Onjuist e-mail of wachtwoord.</p>
        </form>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <header>
            <h1>Urenregistratie</h1>
            <p>Houd je gewerkte uren eenvoudig bij</p>
        </header>

        <section class="form-section glass">
            <h2 id="form-title">Nieuwe Uren Toevoegen</h2>
            <form id="hours-form">
                <input type="hidden" id="entry-id">
                <div class="form-group">
                    <label for="date">Datum</label>
                    <input type="date" id="date" required>
                </div>
                <div class="time-group">
                    <div class="form-group">
                        <label for="start-time">Start Tijd</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group">
                        <label for="end-time">Eind Tijd</label>
                        <input type="time" id="end-time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Beschrijving</label>
                    <input type="text" id="description" placeholder="Wat heb je gedaan?" required>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn-primary">Opslaan</button>
                    <button type="button" id="cancel-btn" class="btn-secondary hidden">Annuleren</button>
                </div>
            </form>
        </section>

        <section class="overview-section glass">
            <div class="overview-header">
                <h2>Geregistreerde Uren</h2>
                <div class="total-hours">
                    <span>Totaal: </span><span id="total-hours-display">0:00</span>
                </div>
            </div>
            <div class="export-actions" style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button id="export-pdf-btn" class="btn-secondary btn-small">Exporteer PDF</button>
                <button id="export-excel-btn" class="btn-secondary btn-small">Exporteer Excel</button>
                <button id="logout-btn" class="btn-secondary btn-small" style="margin-left: auto;">Uitloggen</button>
            </div>
            <div class="entries-container">
                <ul id="entries-list">
                    <!-- Entries will be rendered here by JS -->
                </ul>
                <p id="no-entries-msg" class="empty-msg">Nog geen uren geregistreerd.</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
